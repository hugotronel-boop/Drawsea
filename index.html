<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Papier IA</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video, canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #gui { position: absolute; top: 10px; left: 10px; color: white; z-index: 10; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }
        .piano-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 30%;
            display: flex; opacity: 0.3; pointer-events: none;
        }
        .key { flex: 1; border: 1px solid white; background: rgba(255,255,255,0.2); display: flex; align-items: flex-end; justify-content: center; color: white; padding-bottom: 10px; }
        .key.active { background: rgba(0, 255, 0, 0.6); }
    </style>
</head>
<body>

<div id="gui">
    <h3>Piano IA</h3>
    <p>Placez le dessin du piano sous les zones éclairées.</p>
    <button onclick="startAudio()">Activer le son</button>
</div>

<div id="video-container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div class="piano-overlay" id="piano">
        <div class="key" id="C4">DO</div>
        <div class="key" id="D4">RE</div>
        <div class="key" id="E4">MI</div>
        <div class="key" id="F4">FA</div>
        <div class="key" id="G4">SOL</div>
        <div class="key" id="A4">LA</div>
        <div class="key" id="B4">SI</div>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const synth = new Tone.PolySynth(Tone.Synth).toDestination();

let activeNotes = new Set();

function startAudio() {
    Tone.start();
    document.getElementById('gui').style.display = 'none';
}

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    let currentFrameNotes = new Set();

    if (results.multiHandLandmarks) {
        for (const landmarks of results.multiHandLandmarks) {
            drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
            
            // On récupère l'index (point 8)
            const indexFinger = landmarks[8];
            const x = indexFinger.x * window.innerWidth;
            const y = indexFinger.y * window.innerHeight;

            // Vérifier si le doigt est dans la zone du piano (30% bas de l'écran)
            if (indexFinger.y > 0.7) {
                const keyWidth = window.innerWidth / 7;
                const keyIndex = Math.floor(x / keyWidth);
                const notes = ["C4", "D4", "E4", "F4", "G4", "A4", "B4"];
                
                if (keyIndex >= 0 && keyIndex < 7) {
                    const note = notes[keyIndex];
                    currentFrameNotes.add(note);
                }
            }
        }
    }

    // Gestion du son pour éviter les répétitions en boucle
    const notesToPlay = [...currentFrameNotes].filter(n => !activeNotes.has(n));
    const notesToStop = [...activeNotes].filter(n => !currentFrameNotes.has(n));

    notesToPlay.forEach(n => {
        synth.triggerAttack(n);
        document.getElementById(n).classList.add('active');
    });
    notesToStop.forEach(n => {
        synth.triggerRelease(n);
        document.getElementById(n).classList.remove('active');
    });

    activeNotes = currentFrameNotes;
    canvasCtx.restore();
}

const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
hands.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        await hands.send({image: videoElement});
    },
    width: 1280,
    height: 720
});
camera.start();
</script>
</body>
</html>

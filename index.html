<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Cube Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #06060c;
–c1: #00c2ff;   /* cyan */
–c2: #a855f7;   /* violet */
–c3: #ff2d78;   /* pink */
}

body {
background: var(–bg);
height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
overflow: hidden;
font-family: ‘Space Mono’, monospace;
}

/* Grid bg */
body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(0,194,255,0.035) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,194,255,0.035) 1px, transparent 1px);
background-size: 48px 48px;
pointer-events: none; z-index: 0;
}

/* Ambient glow */
body::after {
content: ‘’;
position: fixed; inset: 0;
background:
radial-gradient(ellipse 70% 50% at 15% 85%, rgba(168,85,247,0.12) 0%, transparent 60%),
radial-gradient(ellipse 60% 60% at 85% 15%, rgba(0,194,255,0.08) 0%, transparent 60%);
pointer-events: none; z-index: 0;
}

/* ───── STATUS BAR ───── */
#status-bar {
position: fixed; top: 0; left: 0; right: 0;
padding: 10px 18px;
display: flex; align-items: center; gap: 10px;
font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
background: rgba(6,6,12,0.85);
border-bottom: 1px solid rgba(0,194,255,0.1);
backdrop-filter: blur(12px); z-index: 100;
color: rgba(255,255,255,0.4);
}
#sdot {
width: 7px; height: 7px; border-radius: 50%;
background: #333; flex-shrink: 0; transition: background .3s;
}
#sdot.on  { background: var(–c1); box-shadow: 0 0 8px var(–c1); animation: blink 1.6s infinite; }
#sdot.err { background: var(–c3); box-shadow: 0 0 8px var(–c3); }
#stxt span { color: var(–c1); }

#coords {
position: fixed; bottom: 14px; left: 50%;
transform: translateX(-50%);
font-size: 9px; letter-spacing: 0.1em;
color: rgba(255,255,255,0.15); z-index: 100; pointer-events: none;
}

/* ───── WORLD ───── */
#world-wrap {
position: relative; z-index: 10;
width: 100vw; height: 100dvh;
perspective: 900px;
perspective-origin: 50% 50%;
overflow: hidden;
}

#world {
position: absolute; inset: 0;
transform-style: preserve-3d;
/* rotated by head tracking */
transform: rotateX(0deg) rotateY(0deg);
will-change: transform;
}

/* ───── CUBE BASE ───── */
.cube {
position: absolute;
transform-style: preserve-3d;
}
.face {
position: absolute;
border: 1px solid;
display: flex; align-items: center; justify-content: center;
}

/* ══════════════════════════════
BIG CUBE  —  premier plan
size: 160px, translateZ: +120px
══════════════════════════════ */
#cube-big {
width: 160px; height: 160px;
left: calc(50% - 80px);
top:  calc(50% - 80px);
transform: translateZ(120px) rotateX(20deg) rotateY(25deg);
animation: spin-big 18s linear infinite;
}

#cube-big .face {
width: 160px; height: 160px;
border-color: rgba(0,194,255,0.5);
background: rgba(0,194,255,0.04);
}
/* diagonal line cross */
#cube-big .face::before, #cube-big .face::after {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, transparent 48%, rgba(0,194,255,0.12) 49%, rgba(0,194,255,0.12) 51%, transparent 52%);
}
#cube-big .face::after {
background: linear-gradient(-135deg, transparent 48%, rgba(0,194,255,0.12) 49%, rgba(0,194,255,0.12) 51%, transparent 52%);
}
/* corner dots */
#cube-big .face .dot {
width: 6px; height: 6px; border-radius: 50%;
background: var(–c1);
box-shadow: 0 0 10px var(–c1);
position: absolute;
}
#cube-big .face .dot:nth-child(1) { top: 8px; left: 8px; }
#cube-big .face .dot:nth-child(2) { top: 8px; right: 8px; }
#cube-big .face .dot:nth-child(3) { bottom: 8px; left: 8px; }
#cube-big .face .dot:nth-child(4) { bottom: 8px; right: 8px; }

#cube-big .front  { transform: translateZ(80px); }
#cube-big .back   { transform: rotateY(180deg) translateZ(80px); }
#cube-big .left   { transform: rotateY(-90deg) translateZ(80px); }
#cube-big .right  { transform: rotateY( 90deg) translateZ(80px); }
#cube-big .top    { transform: rotateX( 90deg) translateZ(80px); }
#cube-big .bottom { transform: rotateX(-90deg) translateZ(80px); }

/* ══════════════════════════════
MEDIUM CUBE  — milieu
size: 90px, translateZ: -60px, décalé
══════════════════════════════ */
#cube-mid {
width: 90px; height: 90px;
left: calc(50% + 60px);
top:  calc(50% - 80px);
transform: translateZ(-60px) rotateX(-15deg) rotateY(40deg);
animation: spin-mid 24s linear infinite reverse;
}
#cube-mid .face {
width: 90px; height: 90px;
border-color: rgba(168,85,247,0.55);
background: rgba(168,85,247,0.04);
}
#cube-mid .face::before {
content: ‘’;
position: absolute; inset: 0;
background: linear-gradient(135deg, transparent 48%, rgba(168,85,247,0.15) 49%, rgba(168,85,247,0.15) 51%, transparent 52%);
}
#cube-mid .face .dot {
width: 4px; height: 4px; border-radius: 50%;
background: var(–c2);
box-shadow: 0 0 8px var(–c2);
position: absolute;
}
#cube-mid .face .dot:nth-child(1) { top: 5px; left: 5px; }
#cube-mid .face .dot:nth-child(2) { top: 5px; right: 5px; }
#cube-mid .face .dot:nth-child(3) { bottom: 5px; left: 5px; }
#cube-mid .face .dot:nth-child(4) { bottom: 5px; right: 5px; }

#cube-mid .front  { transform: translateZ(45px); }
#cube-mid .back   { transform: rotateY(180deg) translateZ(45px); }
#cube-mid .left   { transform: rotateY(-90deg) translateZ(45px); }
#cube-mid .right  { transform: rotateY( 90deg) translateZ(45px); }
#cube-mid .top    { transform: rotateX( 90deg) translateZ(45px); }
#cube-mid .bottom { transform: rotateX(-90deg) translateZ(45px); }

/* ══════════════════════════════
SMALL CUBE  —  arrière-plan loin
size: 50px, translateZ: -260px
══════════════════════════════ */
#cube-small {
width: 50px; height: 50px;
left: calc(50% - 130px);
top:  calc(50% + 40px);
transform: translateZ(-260px) rotateX(30deg) rotateY(-20deg);
animation: spin-small 30s linear infinite;
}
#cube-small .face {
width: 50px; height: 50px;
border-color: rgba(255,45,120,0.5);
background: rgba(255,45,120,0.03);
}
#cube-small .face .dot {
width: 3px; height: 3px; border-radius: 50%;
background: var(–c3);
box-shadow: 0 0 6px var(–c3);
position: absolute;
}
#cube-small .face .dot:nth-child(1) { top: 4px; left: 4px; }
#cube-small .face .dot:nth-child(2) { top: 4px; right: 4px; }
#cube-small .face .dot:nth-child(3) { bottom: 4px; left: 4px; }
#cube-small .face .dot:nth-child(4) { bottom: 4px; right: 4px; }

#cube-small .front  { transform: translateZ(25px); }
#cube-small .back   { transform: rotateY(180deg) translateZ(25px); }
#cube-small .left   { transform: rotateY(-90deg) translateZ(25px); }
#cube-small .right  { transform: rotateY( 90deg) translateZ(25px); }
#cube-small .top    { transform: rotateX( 90deg) translateZ(25px); }
#cube-small .bottom { transform: rotateX(-90deg) translateZ(25px); }

/* ══════════════════════════════
TINY CUBE  —  tout au fond
══════════════════════════════ */
#cube-tiny {
width: 28px; height: 28px;
left: calc(50% + 100px);
top:  calc(50% + 60px);
transform: translateZ(-420px) rotateX(-10deg) rotateY(60deg);
animation: spin-mid 40s linear infinite;
}
#cube-tiny .face {
width: 28px; height: 28px;
border-color: rgba(0,194,255,0.3);
background: rgba(0,194,255,0.02);
}
#cube-tiny .front  { transform: translateZ(14px); }
#cube-tiny .back   { transform: rotateY(180deg) translateZ(14px); }
#cube-tiny .left   { transform: rotateY(-90deg) translateZ(14px); }
#cube-tiny .right  { transform: rotateY( 90deg) translateZ(14px); }
#cube-tiny .top    { transform: rotateX( 90deg) translateZ(14px); }
#cube-tiny .bottom { transform: rotateX(-90deg) translateZ(14px); }

/* ══════════════════════
Floating particles (CSS only)
══════════════════════ */
.particle {
position: absolute;
border-radius: 50%;
pointer-events: none;
}

/* Spin animations — INDEPENDENT of head tracking */
@keyframes spin-big   { to { transform: translateZ(120px) rotateX(360deg) rotateY(360deg); } }
@keyframes spin-mid   { to { transform: translateZ(-60px) rotateX(-360deg) rotateY(400deg); } }
@keyframes spin-small { to { transform: translateZ(-260px) rotateX(390deg) rotateY(-360deg); } }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ───── OVERLAY ───── */
#overlay {
position: fixed; inset: 0;
background: var(–bg);
display: flex; flex-direction: column;
align-items: center; justify-content: center; gap: 20px;
z-index: 200; transition: opacity .6s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

#overlay h1 {
font-size: clamp(34px,9vw,56px);
font-weight: 700; letter-spacing: -0.04em;
text-align: center;
background: linear-gradient(130deg, #fff 20%, var(–c1) 60%, var(–c2));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
background-clip: text; padding: 0 20px;
}
#overlay p {
font-size: 11px; color: rgba(255,255,255,.3);
letter-spacing: .06em; text-align: center;
max-width: 240px; line-height: 1.9;
}

/* Preview cubes in overlay */
.preview-wrap {
position: relative;
width: 180px; height: 120px;
perspective: 600px;
margin: 8px 0;
}
.preview-scene {
position: absolute; inset: 0;
transform-style: preserve-3d;
animation: preview-rotate 6s ease-in-out infinite alternate;
}
@keyframes preview-rotate {
0%   { transform: rotateX(10deg) rotateY(-20deg); }
100% { transform: rotateX(-10deg) rotateY(20deg); }
}
.pc { position: absolute; transform-style: preserve-3d; }
.pf { position: absolute; border: 1px solid; }

#start-btn {
padding: 13px 34px;
background: transparent;
border: 1px solid var(–c1); border-radius: 100px;
color: var(–c1);
font-family: ‘Space Mono’, monospace;
font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
cursor: pointer; position: relative; overflow: hidden;
transition: color .3s, box-shadow .3s;
}
#start-btn::before {
content: ‘’; position: absolute; inset: 0;
background: var(–c1); transform: scaleX(0); transform-origin: left;
transition: transform .3s;
}
#start-btn:active::before { transform: scaleX(1); }
#start-btn:active { color: #06060c; box-shadow: 0 0 24px rgba(0,194,255,.35); }
#start-btn span { position: relative; z-index: 1; }

#loading {
display: none; font-size: 10px;
color: rgba(255,255,255,.25); letter-spacing: .1em;
animation: blink 1s infinite;
}

/* hidden video */
#video { position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; }
</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
/* ── Preview cubes in overlay ─────────────────────── */
(function buildPreview() {
  const ps = document.getElementById('ps');
  const defs = [
    { s:70, x:30, y:20, z:30, col:'rgba(0,194,255,0.5)', bg:'rgba(0,194,255,0.04)' },
    { s:36, x:110, y:40, z:10, col:'rgba(168,85,247,0.5)', bg:'rgba(168,85,247,0.04)' },
    { s:20, x:10,  y:60, z:-40, col:'rgba(255,45,120,0.4)', bg:'transparent' },
  ];
  defs.forEach(d => {
    const c = document.createElement('div');
    c.className = 'pc';
    c.style.cssText = `width:${d.s}px;height:${d.s}px;left:${d.x}px;top:${d.y}px;transform:translateZ(${d.z}px) rotateX(20deg) rotateY(25deg);transform-style:preserve-3d;animation:spin-big ${8+d.s*.2}s linear infinite`;
    const h = d.s/2;
    const faces = ['translateZ','rotateY(180deg) translateZ','rotateY(-90deg) translateZ','rotateY(90deg) translateZ','rotateX(90deg) translateZ','rotateX(-90deg) translateZ'];
    faces.forEach(f => {
      const face = document.createElement('div');
      face.className = 'pf';
      face.style.cssText = `width:${d.s}px;height:${d.s}px;border-color:${d.col};background:${d.bg};transform:${f}(${h}px)`;
      c.appendChild(face);
    });
    ps.appendChild(c);
  });
})();

/* ── Tracking ────────────────────────────────────── */
const video   = document.getElementById('video');
const world   = document.getElementById('world');
const sdot    = document.getElementById('sdot');
const stxt    = document.getElementById('stxt');
const coords  = document.getElementById('coords');
const overlay = document.getElementById('overlay');
const loading = document.getElementById('loading');

let tX=0, tY=0, cX=0, cY=0;
function lerp(a,b,t){ return a+(b-a)*t; }

(function animate(){
  requestAnimationFrame(animate);
  cX = lerp(cX, tX, 0.1);
  cY = lerp(cY, tY, 0.1);
  world.style.transform = `rotateX(${cX}deg) rotateY(${cY}deg)`;
  coords.textContent = `X: ${cY.toFixed(1)}°   Y: ${cX.toFixed(1)}°`;
})();

async function startTracking() {
  loading.style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const fm = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({ maxNumFaces:1, refineLandmarks:false, minDetectionConfidence:.5, minTrackingConfidence:.5 });
  fm.onResults(onResults);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:320}, height:{ideal:240} }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      overlay.classList.add('hidden');
      sdot.className = 'on';
      stxt.innerHTML = 'Tracking <span>actif</span>';
      (async function loop(){
        await fm.send({image: video});
        requestAnimationFrame(loop);
      })();
    };
  } catch(e) {
    sdot.className = 'err';
    stxt.textContent = 'Caméra refusée — autorise dans Safari';
    loading.style.display = 'none';
    document.getElementById('start-btn').style.display = '';
  }
}

function onResults(r) {
  if (!r.multiFaceLandmarks?.length) {
    sdot.className = 'err';
    stxt.innerHTML = 'Visage <span style="color:var(--c3)">perdu</span>';
    tX = 0; tY = 0; return;
  }
  sdot.className = 'on';
  stxt.innerHTML = 'Tracking <span>actif</span>';

  const lm = r.multiFaceLandmarks[0];
  const nose=lm[1], forehead=lm[10], chin=lm[152], lc=lm[234], rc=lm[454];

  const fW   = Math.abs(rc.x - lc.x);
  const midX = (lc.x + rc.x) / 2;
  const normX = (nose.x - midX) / (fW / 2);

  const fH   = Math.abs(chin.y - forehead.y);
  const midY = (forehead.y + chin.y) / 2;
  const normY = (nose.y - midY) / (fH / 2);

  const MAX = 32;
  tY =  normX * MAX;
  tX = -normY * MAX;
}
</script>

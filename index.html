<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PUZZLE·CAM</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap');

:root {
–bg: #0a0a0a;
–surface: #111;
–border: #2a2a2a;
–accent: #e8ff00;
–accent2: #ff4d1a;
–text: #f0ede6;
–muted: #555;
–grain-opacity: 0.04;
}

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; user-select: none; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘DM Mono’, monospace;
height: 100dvh;
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
position: relative;
}

/* Grain overlay */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘1’/%3E%3C/svg%3E”);
opacity: var(–grain-opacity);
pointer-events: none;
z-index: 9999;
}

/* ═══ HEADER ═══ */
#header {
position: fixed;
top: 0; left: 0; right: 0;
padding: 16px 20px 12px;
display: flex;
justify-content: space-between;
align-items: baseline;
border-bottom: 1px solid var(–border);
background: var(–bg);
z-index: 100;
}
#header h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 4px;
color: var(–accent);
}
#header .subtitle {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
}

/* ═══ CAMERA FEED ═══ */
#camera-container {
position: fixed;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
background: #000;
}

#video {
width: 100%;
height: 100%;
object-fit: cover;
opacity: 0.85;
}

/* Vignette */
#camera-container::before {
content: ‘’;
position: absolute;
inset: 0;
background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
z-index: 2;
pointer-events: none;
}

/* ═══ INSTRUCTION ═══ */
#instruction {
position: fixed;
bottom: 40px;
left: 50%;
transform: translateX(-50%);
z-index: 200;
text-align: center;
pointer-events: none;
}
#instruction .line1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 22px;
letter-spacing: 3px;
color: var(–text);
opacity: 0.9;
}
#instruction .line2 {
font-size: 10px;
letter-spacing: 2px;
color: var(–muted);
margin-top: 4px;
}
#instruction .hands-icon {
font-size: 32px;
margin-bottom: 8px;
animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
0%, 100% { transform: scale(1); opacity: 0.7; }
50% { transform: scale(1.15); opacity: 1; }
}

/* ═══ SELECTION RECTANGLE ═══ */
#selection-rect {
position: fixed;
z-index: 300;
border: 2px solid var(–accent);
background: rgba(232, 255, 0, 0.06);
display: none;
pointer-events: none;
box-shadow: 0 0 0 1px rgba(232,255,0,0.15), inset 0 0 30px rgba(232,255,0,0.04);
}
#selection-rect::before, #selection-rect::after {
content: ‘’;
position: absolute;
background: var(–accent);
}
/* Corner markers */
#selection-rect .corner {
position: absolute;
width: 12px; height: 12px;
border-color: var(–accent);
border-style: solid;
}
#selection-rect .corner.tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
#selection-rect .corner.tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; }
#selection-rect .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; }
#selection-rect .corner.br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

/* Size label */
#selection-rect .size-label {
position: absolute;
bottom: -28px;
left: 50%;
transform: translateX(-50%);
font-size: 9px;
letter-spacing: 2px;
color: var(–accent);
white-space: nowrap;
font-family: ‘DM Mono’, monospace;
}

/* ═══ FLASH ═══ */
#flash {
position: fixed;
inset: 0;
background: #fff;
z-index: 1000;
opacity: 0;
pointer-events: none;
}
#flash.go {
animation: flashAnim 0.4s ease-out forwards;
}
@keyframes flashAnim {
0% { opacity: 1; }
100% { opacity: 0; }
}

/* ═══ PUZZLE SCREEN ═══ */
#puzzle-screen {
position: fixed;
inset: 0;
background: var(–bg);
z-index: 500;
display: none;
flex-direction: column;
align-items: center;
justify-content: flex-start;
padding-top: 70px;
}

#puzzle-header {
display: flex;
justify-content: space-between;
align-items: center;
width: 100%;
padding: 0 20px 16px;
}
#puzzle-header .grid-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 3px;
color: var(–accent);
}
#puzzle-header .moves-counter {
font-size: 10px;
letter-spacing: 1px;
color: var(–muted);
}
#puzzle-header .moves-counter span {
color: var(–text);
font-size: 16px;
}

#puzzle-board {
position: relative;
background: #000;
border: 1px solid var(–border);
flex-shrink: 0;
box-shadow: 0 0 60px rgba(0,0,0,0.8);
}

.puzzle-piece {
position: absolute;
cursor: grab;
background-size: auto;
border: 1px solid rgba(0,0,0,0.4);
transition: box-shadow 0.15s ease;
touch-action: none;
}
.puzzle-piece.dragging {
cursor: grabbing;
z-index: 100;
box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 0 2px var(–accent);
transition: none;
}
.puzzle-piece.correct {
box-shadow: inset 0 0 0 2px rgba(232,255,0,0.5);
}

/* Preview thumbnail */
#preview-thumb {
margin: 14px 20px 0;
display: flex;
align-items: center;
gap: 12px;
align-self: flex-start;
}
#preview-thumb canvas {
border: 1px solid var(–border);
opacity: 0.7;
flex-shrink: 0;
}
#preview-thumb .preview-label {
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
line-height: 1.6;
}
#preview-thumb .preview-label strong {
display: block;
color: var(–text);
font-size: 11px;
margin-bottom: 4px;
}

/* ═══ VICTORY SCREEN ═══ */
#victory-screen {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.92);
z-index: 900;
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 0;
}

#victory-screen .trophy {
font-size: 60px;
animation: trophyBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
transform: scale(0);
}
@keyframes trophyBounce {
to { transform: scale(1) rotate(-5deg); }
}

#victory-screen h2 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 56px;
letter-spacing: 6px;
color: var(–accent);
margin-top: 16px;
animation: slideUp 0.4s 0.2s ease-out both;
}

#victory-screen .stats {
font-size: 11px;
letter-spacing: 2px;
color: var(–muted);
margin-top: 8px;
animation: slideUp 0.4s 0.3s ease-out both;
}
#victory-screen .stats span { color: var(–text); }

@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to { opacity: 1; transform: translateY(0); }
}

#victory-screen .divider {
width: 60px;
height: 1px;
background: var(–border);
margin: 28px 0;
animation: slideUp 0.4s 0.4s ease-out both;
}

#victory-screen .next-label {
font-size: 9px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 14px;
animation: slideUp 0.4s 0.45s ease-out both;
}

.btn-grid {
display: flex;
gap: 12px;
animation: slideUp 0.4s 0.5s ease-out both;
flex-wrap: wrap;
justify-content: center;
padding: 0 30px;
}

.btn {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 14px 22px;
border: 1px solid var(–border);
background: transparent;
color: var(–text);
cursor: pointer;
transition: all 0.15s;
position: relative;
overflow: hidden;
}
.btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: var(–text);
opacity: 0;
transition: opacity 0.15s;
}
.btn:active::after { opacity: 0.08; }
.btn.primary {
background: var(–accent);
border-color: var(–accent);
color: #000;
font-weight: 500;
}
.btn.primary:active::after { opacity: 0.15; }

/* ═══ RETAKE BTN ═══ */
#retake-btn {
position: fixed;
bottom: 32px;
right: 20px;
z-index: 600;
font-family: ‘DM Mono’, monospace;
font-size: 9px;
letter-spacing: 2px;
text-transform: uppercase;
padding: 10px 16px;
border: 1px solid var(–border);
background: rgba(10,10,10,0.8);
color: var(–muted);
cursor: pointer;
display: none;
}

/* Hidden canvas for capture */
#capture-canvas { display: none; }

/* ═══ PINCH RING ═══ */
.pinch-dot {
position: fixed;
width: 10px; height: 10px;
border-radius: 50%;
background: var(–accent);
opacity: 0.7;
z-index: 400;
pointer-events: none;
transform: translate(-50%, -50%);
}
</style>

</head>
<body>

<!-- Header -->

<div id="header">
  <h1>PUZZLE·CAM</h1>
  <div class="subtitle">Pinch → Capture → Solve</div>
</div>

<!-- Camera -->

<div id="camera-container">
  <video id="video" autoplay playsinline muted></video>
</div>

<!-- Selection rect -->

<div id="selection-rect">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="size-label" id="size-label">— × —</div>
</div>

<!-- Pinch dots -->

<div class="pinch-dot" id="dot1"></div>
<div class="pinch-dot" id="dot2"></div>

<!-- Instructions -->

<div id="instruction">
  <div class="hands-icon">🤏</div>
  <div class="line1">Étire avec deux doigts</div>
  <div class="line2">pour encadrer une zone · relâche pour capturer</div>
</div>

<!-- Flash -->

<div id="flash"></div>

<!-- Capture canvas (hidden) -->

<canvas id="capture-canvas"></canvas>

<!-- Puzzle screen -->

<div id="puzzle-screen">
  <div id="preview-thumb">
    <canvas id="thumb-canvas" width="56" height="56"></canvas>
    <div class="preview-label">
      <strong>MODÈLE</strong>
      Reconstruis l'image<br>en glissant les pièces
    </div>
  </div>
  <div id="puzzle-header">
    <div class="grid-label" id="grid-label">3 × 3</div>
    <div class="moves-counter">MOVES <span id="move-count">0</span></div>
  </div>
  <div id="puzzle-board"></div>
  <button id="retake-btn">↩ Nouvelle photo</button>
</div>

<!-- Victory -->

<div id="victory-screen">
  <div class="trophy">🏆</div>
  <h2>SOLVED</h2>
  <div class="stats">En <span id="final-moves">0</span> coups</div>
  <div class="divider"></div>
  <div class="next-label">Niveau suivant</div>
  <div class="btn-grid" id="next-btns"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const state = {
  phase: 'camera',   // camera | puzzle | victory
  gridSize: 3,
  moves: 0,
  pieces: [],        // { el, col, row, currentCol, currentRow, correct }
  boardSize: 0,
  pieceSize: 0,
  capturedCanvas: null,
  dragging: null,
  dragOffX: 0, dragOffY: 0,
  boardRect: null,
};

// ═══════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════
const video = document.getElementById('video');
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
  } catch {
    // fallback front camera
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
    } catch(e) {
      alert('Caméra non disponible. Essaie dans un navigateur mobile.');
    }
  }
}
startCamera();

// ═══════════════════════════════════════════════
// PINCH DETECTION
// ═══════════════════════════════════════════════
const selRect = document.getElementById('selection-rect');
const sizeLabel = document.getElementById('size-label');
const dot1 = document.getElementById('dot1');
const dot2 = document.getElementById('dot2');
const instruction = document.getElementById('instruction');

let activeTouches = {};
let isPinching = false;

function updateDots(t1, t2) {
  dot1.style.left = t1.clientX + 'px';
  dot1.style.top  = t1.clientY + 'px';
  dot2.style.left = t2.clientX + 'px';
  dot2.style.top  = t2.clientY + 'px';
  dot1.style.display = 'block';
  dot2.style.display = 'block';
}

function hideDots() {
  dot1.style.display = 'none';
  dot2.style.display = 'none';
}

function updateSelectionRect(t1, t2) {
  const x = Math.min(t1.clientX, t2.clientX);
  const y = Math.min(t1.clientY, t2.clientY);
  const w = Math.abs(t1.clientX - t2.clientX);
  const h = Math.abs(t1.clientY - t2.clientY);

  selRect.style.left   = x + 'px';
  selRect.style.top    = y + 'px';
  selRect.style.width  = w + 'px';
  selRect.style.height = h + 'px';
  selRect.style.display = 'block';

  sizeLabel.textContent = Math.round(w) + ' × ' + Math.round(h);
}

document.addEventListener('touchstart', (e) => {
  if (state.phase !== 'camera') return;
  for (const t of e.changedTouches) activeTouches[t.identifier] = t;

  const ids = Object.keys(activeTouches);
  if (ids.length >= 2) {
    isPinching = true;
    instruction.style.opacity = '0';
    instruction.style.transition = 'opacity 0.3s';
  }
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  if (state.phase !== 'camera') return;
  for (const t of e.changedTouches) activeTouches[t.identifier] = t;

  const ids = Object.keys(activeTouches);
  if (ids.length >= 2 && isPinching) {
    const t1 = activeTouches[ids[0]];
    const t2 = activeTouches[ids[1]];
    updateDots(t1, t2);
    updateSelectionRect(t1, t2);
  }
}, { passive: true });

document.addEventListener('touchend', (e) => {
  if (state.phase !== 'camera') return;

  for (const t of e.changedTouches) delete activeTouches[t.identifier];

  const ids = Object.keys(activeTouches);
  if (isPinching && ids.length < 2) {
    isPinching = false;
    hideDots();

    // Check we have a meaningful rect
    const rect = selRect.getBoundingClientRect();
    const w = selRect.offsetWidth;
    const h = selRect.offsetHeight;

    if (w > 60 && h > 60) {
      captureAndBuildPuzzle(selRect.offsetLeft, selRect.offsetTop, w, h);
    }
    selRect.style.display = 'none';
    instruction.style.opacity = '1';
  }
}, { passive: true });

// ═══════════════════════════════════════════════
// CAPTURE
// ═══════════════════════════════════════════════
function captureAndBuildPuzzle(x, y, w, h) {
  // Flash
  const flash = document.getElementById('flash');
  flash.classList.remove('go');
  void flash.offsetWidth;
  flash.classList.add('go');

  setTimeout(() => {
    // Draw video frame to hidden canvas at native resolution
    const capCanvas = document.getElementById('capture-canvas');
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const sw = window.innerWidth;
    const sh = window.innerHeight;

    // Video is object-fit: cover — compute actual rendered area
    const videoAspect = vw / vh;
    const screenAspect = sw / sh;
    let renderW, renderH, offsetX = 0, offsetY = 0;
    if (videoAspect > screenAspect) {
      renderH = sh;
      renderW = sh * videoAspect;
      offsetX = (renderW - sw) / 2;
    } else {
      renderW = sw;
      renderH = sw / videoAspect;
      offsetY = (renderH - sh) / 2;
    }

    // Scale selection rect to video coords
    const scaleX = vw / renderW;
    const scaleY = vh / renderH;
    const sx = Math.max(0, (x + offsetX) * scaleX);
    const sy = Math.max(0, (y + offsetY) * scaleY);
    const sw2 = Math.min(w * scaleX, vw - sx);
    const sh2 = Math.min(h * scaleY, vh - sy);

    // Make square for cleaner puzzle
    const side = Math.min(sw2, sh2);
    const finalSX = sx + (sw2 - side) / 2;
    const finalSY = sy + (sh2 - side) / 2;

    capCanvas.width = side;
    capCanvas.height = side;
    const ctx = capCanvas.getContext('2d');
    ctx.drawImage(video, finalSX, finalSY, side, side, 0, 0, side, side);

    state.capturedCanvas = capCanvas;
    buildPuzzle(state.gridSize);
  }, 80);
}

// ═══════════════════════════════════════════════
// PUZZLE BUILD
// ═══════════════════════════════════════════════
function buildPuzzle(gridSize) {
  state.phase = 'puzzle';
  state.gridSize = gridSize;
  state.moves = 0;
  state.pieces = [];
  document.getElementById('move-count').textContent = '0';
  document.getElementById('grid-label').textContent = gridSize + ' × ' + gridSize;

  const screen = document.getElementById('puzzle-screen');
  screen.style.display = 'flex';

  const board = document.getElementById('puzzle-board');
  board.innerHTML = '';

  // Board sizing
  const maxW = Math.min(window.innerWidth - 40, window.innerHeight - 240);
  const boardSize = Math.floor(maxW / gridSize) * gridSize;
  state.boardSize = boardSize;
  const pieceSize = boardSize / gridSize;
  state.pieceSize = pieceSize;

  board.style.width  = boardSize + 'px';
  board.style.height = boardSize + 'px';

  // Preview thumb
  const thumb = document.getElementById('thumb-canvas');
  const tw = 56, th = 56;
  thumb.width = tw; thumb.height = th;
  thumb.getContext('2d').drawImage(state.capturedCanvas, 0, 0, tw, th);

  // Create pieces
  const n = gridSize;
  const srcSize = state.capturedCanvas.width;
  const srcPiece = srcSize / n;

  // Build order array and shuffle
  const positions = [];
  for (let r = 0; r < n; r++)
    for (let c = 0; c < n; c++)
      positions.push({ col: c, row: r });

  // Fisher-Yates
  for (let i = positions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [positions[i], positions[j]] = [positions[j], positions[i]];
  }

  const offscreenCanvas = document.createElement('canvas');
  offscreenCanvas.width = pieceSize;
  offscreenCanvas.height = pieceSize;

  for (let i = 0; i < n * n; i++) {
    const origCol = i % n;
    const origRow = Math.floor(i / n);
    const { col: curCol, row: curRow } = positions[i];

    const el = document.createElement('div');
    el.className = 'puzzle-piece';
    el.style.width  = pieceSize + 'px';
    el.style.height = pieceSize + 'px';

    // Draw piece image via canvas → data URL for crisp rendering
    const pc = document.createElement('canvas');
    pc.width = pieceSize;
    pc.height = pieceSize;
    const pctx = pc.getContext('2d');
    pctx.drawImage(
      state.capturedCanvas,
      origCol * srcPiece, origRow * srcPiece, srcPiece, srcPiece,
      0, 0, pieceSize, pieceSize
    );
    el.style.backgroundImage = `url(${pc.toDataURL()})`;
    el.style.backgroundSize = '100% 100%';

    el.style.left = (curCol * pieceSize) + 'px';
    el.style.top  = (curRow * pieceSize) + 'px';

    board.appendChild(el);

    const piece = {
      el,
      origCol, origRow,
      curCol, curRow,
    };
    state.pieces.push(piece);

    attachPieceDrag(piece);
  }

  // Retake button
  const retake = document.getElementById('retake-btn');
  retake.style.display = 'block';
  retake.onclick = () => {
    state.phase = 'camera';
    screen.style.display = 'none';
    retake.style.display = 'none';
    document.getElementById('victory-screen').style.display = 'none';
  };

  updateBoardRect();
}

function updateBoardRect() {
  state.boardRect = document.getElementById('puzzle-board').getBoundingClientRect();
}

// ═══════════════════════════════════════════════
// PIECE DRAG
// ═══════════════════════════════════════════════
function attachPieceDrag(piece) {
  const el = piece.el;

  el.addEventListener('touchstart', (e) => {
    if (state.dragging) return;
    e.stopPropagation();
    const t = e.touches[0];
    updateBoardRect();

    state.dragging = piece;
    piece.el.classList.add('dragging');

    const elRect = el.getBoundingClientRect();
    state.dragOffX = t.clientX - elRect.left;
    state.dragOffY = t.clientY - elRect.top;

    el.style.zIndex = 100;
  }, { passive: true });
}

document.addEventListener('touchmove', (e) => {
  if (!state.dragging || state.phase !== 'puzzle') return;
  const t = e.touches[0];
  const board = state.boardRect;

  let nx = t.clientX - board.left - state.dragOffX;
  let ny = t.clientY - board.top  - state.dragOffY;

  // Clamp inside board
  nx = Math.max(0, Math.min(nx, state.boardSize - state.pieceSize));
  ny = Math.max(0, Math.min(ny, state.boardSize - state.pieceSize));

  state.dragging.el.style.left = nx + 'px';
  state.dragging.el.style.top  = ny + 'px';
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!state.dragging || state.phase !== 'puzzle') return;
  const piece = state.dragging;

  // Snap to nearest cell
  const nx = parseFloat(piece.el.style.left);
  const ny = parseFloat(piece.el.style.top);
  const ps = state.pieceSize;
  const n  = state.gridSize;

  const snapCol = Math.round(nx / ps);
  const snapRow = Math.round(ny / ps);
  const clampCol = Math.max(0, Math.min(snapCol, n - 1));
  const clampRow = Math.max(0, Math.min(snapRow, n - 1));

  // Check if target cell is occupied
  const occupant = state.pieces.find(p => p !== piece && p.curCol === clampCol && p.curRow === clampRow);
  if (occupant) {
    // Swap
    const oldCol = piece.curCol;
    const oldRow = piece.curRow;
    occupant.curCol = oldCol;
    occupant.curRow = oldRow;
    occupant.el.style.left = (oldCol * ps) + 'px';
    occupant.el.style.top  = (oldRow * ps) + 'px';
    occupant.el.style.zIndex = 1;
    occupant.el.classList.remove('dragging');
  }

  piece.curCol = clampCol;
  piece.curRow = clampRow;
  piece.el.style.left = (clampCol * ps) + 'px';
  piece.el.style.top  = (clampRow * ps) + 'px';
  piece.el.style.zIndex = 1;
  piece.el.classList.remove('dragging');

  state.dragging = null;
  state.moves++;
  document.getElementById('move-count').textContent = state.moves;

  // Correct markers
  state.pieces.forEach(p => {
    if (p.curCol === p.origCol && p.curRow === p.origRow) {
      p.el.classList.add('correct');
    } else {
      p.el.classList.remove('correct');
    }
  });

  // Check win
  const solved = state.pieces.every(p => p.curCol === p.origCol && p.curRow === p.origRow);
  if (solved) setTimeout(showVictory, 300);
});

// ═══════════════════════════════════════════════
// VICTORY
// ═══════════════════════════════════════════════
function showVictory() {
  state.phase = 'victory';
  document.getElementById('final-moves').textContent = state.moves;

  const vs = document.getElementById('victory-screen');
  vs.style.display = 'flex';

  // Build next level buttons
  const btns = document.getElementById('next-btns');
  btns.innerHTML = '';
  const nextGrid = state.gridSize + 1;

  const btnRetake = document.createElement('button');
  btnRetake.className = 'btn';
  btnRetake.textContent = '↩ Même zone';
  btnRetake.onclick = () => {
    vs.style.display = 'none';
    buildPuzzle(state.gridSize);
  };

  const btnNext = document.createElement('button');
  btnNext.className = 'btn primary';
  btnNext.textContent = nextGrid + '×' + nextGrid + ' → Niveau +';
  btnNext.onclick = () => {
    vs.style.display = 'none';
    buildPuzzle(nextGrid);
  };

  const btnNew = document.createElement('button');
  btnNew.className = 'btn';
  btnNew.textContent = '📷 Nouvelle photo';
  btnNew.style.width = '100%';
  btnNew.onclick = () => {
    vs.style.display = 'none';
    state.phase = 'camera';
    document.getElementById('puzzle-screen').style.display = 'none';
    document.getElementById('retake-btn').style.display = 'none';
    state.gridSize = 3;
  };

  btns.appendChild(btnRetake);
  btns.appendChild(btnNext);

  const row2 = document.createElement('div');
  row2.style.width = '100%';
  row2.style.display = 'flex';
  row2.style.justifyContent = 'center';
  row2.appendChild(btnNew);
  btns.appendChild(row2);
}

// ═══════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize', () => {
  if (state.phase === 'puzzle') updateBoardRect();
});
</script>

<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Holographic Window</title>
<style>
  :root { color-scheme: dark; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%;
    background:#04040a !important;
    background-color:#04040a !important;
    overflow:hidden;
    font-family:'Space Mono',monospace;
  }
  #c {
    display:block;
    position:fixed; top:0; left:0;
    width:100%; height:100%;
    background:#04040a;
  }

/* HUD */
#hud {
position:fixed; top:0; left:0; right:0;
padding:10px 18px;
display:flex; align-items:center; justify-content:space-between;
font-size:9px; letter-spacing:.13em; text-transform:uppercase;
background:rgba(4,4,10,0.85);
border-bottom:1px solid rgba(0,200,255,0.08);
backdrop-filter:blur(14px); z-index:100;
color:rgba(255,255,255,.3);
}
#hud-l { display:flex; align-items:center; gap:8px; }
#hdot {
width:6px; height:6px; border-radius:50%;
background:#333; transition:background .3s, box-shadow .3s;
}
#hdot.on  { background:#00c8ff; box-shadow:0 0 8px #00c8ff; animation:pulse 1.8s infinite; }
#hdot.err { background:#ff2d78; box-shadow:0 0 8px #ff2d78; animation:none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
#stxt em { color:#00c8ff; font-style:normal; }

/* mini webcam preview */
#preview-wrap {
position:fixed; bottom:16px; right:16px;
width:120px; height:90px;
border:1px solid rgba(0,200,255,0.2);
border-radius:8px; overflow:hidden;
z-index:100; opacity:0;
transition:opacity .5s;
background:#000;
}
#preview-wrap.visible { opacity:1; }
#preview {
width:100%; height:100%;
object-fit:cover;
transform:scaleX(-1); /* mirror */
filter:brightness(.7) contrast(1.1);
}
/* face dot overlay on preview */
#face-dot {
position:absolute; width:8px; height:8px;
border-radius:50%; background:#00c8ff;
box-shadow:0 0 8px #00c8ff;
transform:translate(-50%,-50%);
pointer-events:none;
transition:left .05s, top .05s;
}
#preview-label {
position:absolute; bottom:4px; left:50%;
transform:translateX(-50%);
font-size:7px; letter-spacing:.1em;
color:rgba(255,255,255,.4);
white-space:nowrap;
}

#coords {
position:fixed; bottom:16px; left:16px;
font-size:8px; letter-spacing:.1em;
color:rgba(255,255,255,.15); pointer-events:none; z-index:100;
line-height:1.8;
}

/* OVERLAY */
#overlay {
position:fixed; inset:0;
background:#04040a;
display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:20px;
z-index:200; transition:opacity .7s;
}
#overlay.hidden { opacity:0; pointer-events:none; }

#overlay h1 {
font-size:clamp(28px,7vw,48px); font-weight:700;
letter-spacing:-.03em; text-align:center;
background:linear-gradient(130deg,#fff 20%,#00c8ff 55%,#a855f7);
-webkit-background-clip:text; -webkit-text-fill-color:transparent;
background-clip:text; padding:0 24px; line-height:1.1;
}
#overlay p {
font-size:10px; color:rgba(255,255,255,.3);
letter-spacing:.06em; text-align:center;
max-width:280px; line-height:2;
}
#overlay small {
font-size:9px; color:rgba(255,255,255,.18);
letter-spacing:.05em; text-align:center;
}

#start-btn {
padding:13px 36px;
background:transparent;
border:1px solid #00c8ff; border-radius:100px;
color:#00c8ff;
font-family:‘Space Mono’,monospace;
font-size:11px; letter-spacing:.15em; text-transform:uppercase;
cursor:pointer; position:relative; overflow:hidden;
transition:color .3s, box-shadow .3s;
}
#start-btn::before {
content:’’; position:absolute; inset:0;
background:#00c8ff; transform:scaleX(0); transform-origin:left;
transition:transform .3s;
}
#start-btn:hover::before,
#start-btn:active::before { transform:scaleX(1); }
#start-btn:hover, #start-btn:active { color:#04040a; box-shadow:0 0 24px rgba(0,200,255,.4); }
#start-btn span { position:relative; z-index:1; }

#loading {
display:none; font-size:10px;
color:rgba(255,255,255,.25); letter-spacing:.1em;
animation:blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

#video { position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; }
</style>

</head>
<body>

<canvas id="c"></canvas>
<video id="video" playsinline autoplay muted></video>

<!-- OVERLAY -->

<div id="overlay">
  <h1>Holographic<br>Window</h1>
  <p>Déplace-toi physiquement<br>gauche / droite / haut / bas —<br>la fenêtre 3D suit ta position.</p>
  <small>Comme regarder par une vraie fenêtre.</small>
  <button id="start-btn" onclick="startTracking()"><span>Activer caméra</span></button>
  <div id="loading">Chargement MediaPipe…</div>
</div>

<!-- HUD -->

<div id="hud">
  <div id="hud-l">
    <div id="hdot"></div>
    <div id="stxt">En attente…</div>
  </div>
  <div style="color:rgba(255,255,255,.15)">WebGL · MediaPipe</div>
</div>

<!-- Webcam mini preview -->

<div id="preview-wrap">
  <video id="preview" playsinline autoplay muted></video>
  <div id="face-dot"></div>
  <div id="preview-label">position tracking</div>
</div>

<div id="coords">
  face x: 0.00<br>
  face y: 0.00<br>
  cam  x: 0.00  y: 0.00
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x04040a, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04040a);
scene.fog = new THREE.Fog(0x04040a, 8, 20);

// ── CAMERA — this is what moves with your head ──
const cam = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
cam.position.set(0, 0, 5);
cam.lookAt(0, 0, 0);

// ── Cube factory ──
function makeCube(size, x, y, z, color) {
  const geo   = new THREE.BoxGeometry(size, size, size);
  const group = new THREE.Group();

  // fill
  group.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color, transparent:true, opacity:0.05
  })));

  // edges
  group.add(new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.9 })
  ));

  // glow corner dots
  if (size > 0.15) {
    const h = size/2;
    const verts = new Float32Array([
      -h,-h,-h, h,-h,-h,-h, h,-h, h, h,-h,
      -h,-h, h, h,-h, h,-h, h, h, h, h, h
    ]);
    const pg = new THREE.BufferGeometry();
    pg.setAttribute('position', new THREE.BufferAttribute(verts,3));
    group.add(new THREE.Points(pg, new THREE.PointsMaterial({
      color, size:size*.07, transparent:true, opacity:.95, sizeAttenuation:true
    })));
  }

  group.position.set(x, y, z);
  scene.add(group);
  return group;
}

// Cubes at varying Z depths — this is what creates parallax
const cubes = [
  { g: makeCube(1.8,   0,    0,    2.5,  0x00c8ff), sx:.0025, sy:.004  },
  { g: makeCube(1.0,   1.6,  0.5,  0.5,  0xa855f7), sx:.004,  sy:.003  },
  { g: makeCube(0.65, -1.6, -0.4, -0.5,  0xff2d78), sx:.003,  sy:.006  },
  { g: makeCube(0.38,  1.9, -1.1, -2.0,  0x00c8ff), sx:.006,  sy:.004  },
  { g: makeCube(0.24, -1.2,  1.3, -3.5,  0xa855f7), sx:.005,  sy:.005  },
  { g: makeCube(0.15,  0.6, -1.6, -5.0,  0xff2d78), sx:.007,  sy:.006  },
];

// Base Y positions for floating animation
const baseY = cubes.map(c => c.g.position.y);

// ── Grid floor ──
const grid = new THREE.GridHelper(20, 24, 0x001520, 0x001520);
grid.position.y = -3;
grid.material.transparent = true; grid.material.opacity = 0.6;
scene.add(grid);

// ── Particles ──
const PCOUNT = 160;
const pArr = new Float32Array(PCOUNT*3);
for (let i=0; i<PCOUNT; i++) {
  pArr[i*3]   = (Math.random()-.5)*14;
  pArr[i*3+1] = (Math.random()-.5)*10;
  pArr[i*3+2] = (Math.random()-.5)*10-3;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pArr,3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color:0x00c8ff, size:.02, transparent:true, opacity:.25, sizeAttenuation:true
}));
scene.add(particles);

// ── Connection lines ──
for (let i=0; i<cubes.length-1; i++) {
  const a = cubes[i].g.position, b = cubes[i+1].g.position;
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(a.x,a.y,a.z),
    new THREE.Vector3(b.x,b.y,b.z)
  ]);
  scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({
    color:0x00c8ff, transparent:true, opacity:.08
  })));
}

// ═══════════════════════════════════════════════
//  FACE POSITION TRACKING
//  ── KEY DIFFERENCE vs before ──
//  We track the MIDPOINT between both eyes in the
//  video frame (0..1 coords), NOT head rotation.
//  Moving your head right → face midpoint goes right
//  → camera shifts right → you see left side of scene
// ═══════════════════════════════════════════════
const video      = document.getElementById('video');
const previewVid = document.getElementById('preview');
const previewWrap= document.getElementById('preview-wrap');
const faceDot    = document.getElementById('face-dot');
const hdot       = document.getElementById('hdot');
const stxt       = document.getElementById('stxt');
const overlay    = document.getElementById('overlay');
const loading    = document.getElementById('loading');
const coordEl    = document.getElementById('coords');

// Camera shift range (world units)
const CAM_X = 4.5;
const CAM_Y = 3.0;

let camTargetX = 0, camTargetY = 0;
let camCurX = 0,    camCurY = 0;
let faceX = 0.5,    faceY = 0.5;  // raw face position in frame (0..1)
let faceFound = false;

function lerp(a,b,t){ return a+(b-a)*t; }

async function startTracking() {
  loading.style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const fm = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({
    maxNumFaces:1,
    refineLandmarks:false,
    minDetectionConfidence:.5,
    minTrackingConfidence:.5
  });
  fm.onResults(onFace);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:640}, height:{ideal:480} }
    });
    video.srcObject = stream;
    previewVid.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      previewVid.play();
      overlay.classList.add('hidden');
      previewWrap.classList.add('visible');
      hdot.className = 'on';
      stxt.innerHTML = 'Position <em>tracking actif</em>';

      ;(async function loop() {
        await fm.send({ image: video });
        requestAnimationFrame(loop);
      })();
    };
  } catch(e) {
    hdot.className = 'err';
    stxt.textContent = 'Caméra refusée — autorise dans Safari';
    loading.style.display = 'none';
    document.getElementById('start-btn').style.display = '';
  }
}

function onFace(r) {
  if (!r.multiFaceLandmarks?.length) {
    faceFound = false;
    hdot.className = 'err';
    stxt.innerHTML = 'Visage <em style="color:#ff2d78">perdu</em>';
    // Slowly return to center
    camTargetX = lerp(camTargetX, 0, .03);
    camTargetY = lerp(camTargetY, 0, .03);
    faceDot.style.opacity = '0';
    return;
  }

  faceFound = true;
  hdot.className = 'on';
  stxt.innerHTML = 'Position <em>tracking actif</em>';

  const lm = r.multiFaceLandmarks[0];

  // ── POSITION TRACKING ──
  // Use midpoint between LEFT eye (landmarks 33) and RIGHT eye (263)
  // These give us the face center X/Y in the video frame (0..1)
  const leftEye  = lm[33];
  const rightEye = lm[263];

  // Raw face position in frame
  faceX = (leftEye.x + rightEye.x) / 2;   // 0=left, 1=right
  faceY = (leftEye.y + rightEye.y) / 2;   // 0=top,  1=bottom

  // Webcam is mirrored — flip X
  const flippedX = 1 - faceX;

  // Convert 0..1 → -1..1 centered
  const normX = (flippedX - 0.5) * 2;
  const normY = (faceY    - 0.5) * 2;

  // Camera target = head position scaled to world units
  camTargetX = normX * CAM_X;
  camTargetY = -normY * CAM_Y;

  // Update face dot on preview (mirrored display)
  faceDot.style.opacity = '1';
  faceDot.style.left = ((1 - faceX) * 100) + '%';
  faceDot.style.top  = (faceY * 100) + '%';
}

// ═══════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════
const clock = new THREE.Clock();

(function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  // Smooth camera position — the holographic shift
  camCurX = lerp(camCurX, camTargetX, 0.09);
  camCurY = lerp(camCurY, camTargetY, 0.09);

  // ── HOLOGRAPHIC WINDOW TRICK ──
  // Camera moves in X/Y but ALWAYS looks at origin
  // = you're looking through a fixed window into the 3D world
  cam.position.x = camCurX;
  cam.position.y = camCurY;
  cam.position.z = 5;
  cam.lookAt(0, 0, 0);

  // Spin + float cubes
  cubes.forEach(({ g, sx, sy }, i) => {
    g.rotation.x += sx;
    g.rotation.y += sy;
    g.position.y = baseY[i] + Math.sin(t * 0.3 + i * 1.2) * 0.06;
  });

  // Particles drift
  particles.rotation.y = t * 0.015;

  // Grid subtle parallax
  grid.position.x = camCurX * -.2;
  grid.position.z = camCurY * -.1;

  renderer.render(scene, cam);

  coordEl.innerHTML =
    `face x: ${(camTargetX/CAM_X).toFixed(2)}<br>` +
    `face y: ${(-camTargetY/CAM_Y).toFixed(2)}<br>` +
    `cam &nbsp;x: ${camCurX.toFixed(2)}  y: ${camCurY.toFixed(2)}`;
})();

window.addEventListener('resize', () => {
  cam.aspect = window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

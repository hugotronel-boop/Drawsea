<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Holographic Head Tracker</title>
<style>
  /* GitHub Pages reset — force dark everywhere */
  :root { color-scheme: dark; }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html {
    background:#04040a !important;
    background-color:#04040a !important;
    height:100%; width:100%;
  }
  body {
    background:#04040a !important;
    background-color:#04040a !important;
    color:#e0e0e0;
    width:100%; height:100%;
    overflow:hidden;
    font-family:'Space Mono',monospace;
  }
  #c {
    display:block;
    width:100% !important;
    height:100% !important;
    position:fixed;
    top:0; left:0;
    background:#04040a;
  }

/* HUD */
#hud {
position:fixed; top:0; left:0; right:0;
padding:10px 18px;
display:flex; align-items:center; justify-content:space-between;
font-size:9px; letter-spacing:.13em; text-transform:uppercase;
background:rgba(4,4,10,0.85);
border-bottom:1px solid rgba(0,200,255,0.1);
backdrop-filter:blur(14px); z-index:100;
color:rgba(255,255,255,.3);
}
#hud-l { display:flex; align-items:center; gap:8px; }
#hdot {
width:6px; height:6px; border-radius:50%;
background:#555; box-shadow:none;
transition:background .3s, box-shadow .3s;
}
#hdot.on  { background:#00c8ff; box-shadow:0 0 8px #00c8ff; animation:pulse 1.8s infinite; }
#hdot.err { background:#ff2d78; box-shadow:0 0 8px #ff2d78; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
#stxt em { color:#00c8ff; font-style:normal; }
#stxt.err em { color:#ff2d78; }

#coords {
position:fixed; bottom:12px; left:50%;
transform:translateX(-50%);
font-size:8px; letter-spacing:.1em;
color:rgba(255,255,255,.12); pointer-events:none; z-index:100;
white-space:nowrap;
}

/* OVERLAY */
#overlay {
position:fixed; inset:0;
background:#04040a;
display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:22px;
z-index:200; transition:opacity .7s;
}
#overlay.hidden { opacity:0; pointer-events:none; }

#overlay h1 {
font-size:clamp(30px,8vw,52px); font-weight:700;
letter-spacing:-.03em; text-align:center;
background:linear-gradient(130deg,#fff 20%,#00c8ff 55%,#a855f7);
-webkit-background-clip:text; -webkit-text-fill-color:transparent;
background-clip:text; padding:0 24px;
}
#overlay p {
font-size:10px; color:rgba(255,255,255,.3);
letter-spacing:.07em; text-align:center;
max-width:260px; line-height:2;
}

#start-btn {
padding:13px 36px;
background:transparent;
border:1px solid #00c8ff; border-radius:100px;
color:#00c8ff;
font-family:‘Space Mono’,monospace;
font-size:11px; letter-spacing:.15em; text-transform:uppercase;
cursor:pointer; position:relative; overflow:hidden;
transition:color .3s, box-shadow .3s;
}
#start-btn::before {
content:’’; position:absolute; inset:0;
background:#00c8ff; transform:scaleX(0); transform-origin:left;
transition:transform .3s;
}
#start-btn:hover::before,
#start-btn:active::before { transform:scaleX(1); }
#start-btn:hover, #start-btn:active { color:#04040a; box-shadow:0 0 24px rgba(0,200,255,.4); }
#start-btn span { position:relative; z-index:1; }

#loading {
display:none; font-size:10px;
color:rgba(255,255,255,.25); letter-spacing:.1em;
animation:blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* mode toggle */
#mode-btn {
position:fixed; bottom:36px; right:16px;
padding:7px 14px;
background:rgba(4,4,10,0.8);
border:1px solid rgba(0,200,255,0.2); border-radius:100px;
color:rgba(255,255,255,.35);
font-family:‘Space Mono’,monospace;
font-size:8px; letter-spacing:.1em; text-transform:uppercase;
cursor:pointer; z-index:100;
transition:border-color .2s, color .2s;
}
#mode-btn:hover { border-color:rgba(0,200,255,.5); color:#00c8ff; }

/* hidden video */
#video { position:fixed; top:-9999px; left:-9999px; width:1px; height:1px; }
</style>

</head>
<body>

<canvas id="c"></canvas>
<video id="video" playsinline autoplay muted></video>

<!-- OVERLAY -->

<div id="overlay">
  <h1>Holographic<br>Head Tracker</h1>
  <p>Ta tête déplace la caméra —<br>vrai rendu holographique WebGL.</p>
  <button id="start-btn" onclick="startTracking()"><span>Activer caméra</span></button>
  <div id="loading">Chargement MediaPipe + Three.js…</div>
</div>

<!-- HUD -->

<div id="hud">
  <div id="hud-l">
    <div id="hdot"></div>
    <div id="stxt">En attente…</div>
  </div>
  <div>Three.js · MediaPipe</div>
</div>

<button id="mode-btn" onclick="toggleMode()">⇄ Souris</button>

<div id="coords">cam x:0.00  y:0.00</div>

<!-- Three.js -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- MediaPipe FaceMesh -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x04040a, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04040a);  // force black — fixes GitHub Pages

const cam = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
cam.position.set(0, 0, 5);
cam.lookAt(0, 0, 0);

// ── Materials ──
function edgeMat(hex, op=0.85) {
  return new THREE.LineBasicMaterial({ color:hex, transparent:true, opacity:op });
}
function fillMat(hex) {
  return new THREE.MeshBasicMaterial({ color:hex, transparent:true, opacity:0.04, side:THREE.FrontSide });
}
function makeEdges(geo, mat) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geo), mat);
}

// ── Cubes ──
const CUBES = [
  { s:1.6,  x: 0,    y: 0,    z: 1.8,  c:0x00c8ff, sx:.003, sy:.005 },
  { s:0.9,  x: 1.4,  y: 0.6,  z: 0.2,  c:0xa855f7, sx:.005, sy:.003 },
  { s:0.55, x:-1.5,  y:-0.5,  z:-0.8,  c:0xff2d78, sx:.004, sy:.007 },
  { s:0.32, x: 1.8,  y:-1.0,  z:-1.8,  c:0x00c8ff, sx:.007, sy:.004 },
  { s:0.22, x:-1.0,  y: 1.2,  z:-2.8,  c:0xa855f7, sx:.006, sy:.005 },
  { s:0.14, x: 0.5,  y:-1.4,  z:-4.0,  c:0xff2d78, sx:.008, sy:.006 },
];

const meshes = CUBES.map(d => {
  const geo   = new THREE.BoxGeometry(d.s, d.s, d.s);
  const group = new THREE.Group();
  group.add(new THREE.Mesh(geo, fillMat(d.c)));
  group.add(makeEdges(geo, edgeMat(d.c)));
  // corner dots
  if (d.s > 0.2) {
    const h = d.s/2;
    const verts = new Float32Array([
      -h,-h,-h, h,-h,-h,-h, h,-h, h, h,-h,
      -h,-h, h, h,-h, h,-h, h, h, h, h, h
    ]);
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(verts,3));
    group.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
      color:d.c, size:d.s*.065, transparent:true, opacity:.9, sizeAttenuation:true
    })));
  }
  group.position.set(d.x, d.y, d.z);
  scene.add(group);
  return { group, d };
});

// ── Grid ──
const grid = new THREE.GridHelper(14, 20, 0x001520, 0x001520);
grid.position.y = -2.5;
grid.material.transparent = true; grid.material.opacity = 0.7;
scene.add(grid);

// ── Particles ──
const PCOUNT = 140;
const pPos = new Float32Array(PCOUNT*3);
for (let i=0;i<PCOUNT;i++){
  pPos[i*3]   = (Math.random()-.5)*12;
  pPos[i*3+1] = (Math.random()-.5)*9;
  pPos[i*3+2] = (Math.random()-.5)*9-2;
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos,3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({
  color:0x00c8ff, size:.022, transparent:true, opacity:.3, sizeAttenuation:true
}));
scene.add(particles);

// ── Connection lines ──
[[0,1],[1,2],[2,3],[3,4]].forEach(([a,b]) => {
  const pts = [
    new THREE.Vector3(CUBES[a].x, CUBES[a].y, CUBES[a].z),
    new THREE.Vector3(CUBES[b].x, CUBES[b].y, CUBES[b].z),
  ];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color:0x00c8ff, transparent:true, opacity:.1 })
  ));
});

// ═══════════════════════════════════════════════
//  INPUT — HEAD TRACKING + MOUSE FALLBACK
// ═══════════════════════════════════════════════
const video   = document.getElementById('video');
const hdot    = document.getElementById('hdot');
const stxt    = document.getElementById('stxt');
const overlay = document.getElementById('overlay');
const loading = document.getElementById('loading');
const modeBtn = document.getElementById('mode-btn');
const coordEl = document.getElementById('coords');

const CAM_RANGE_X = 1.8;
const CAM_RANGE_Y = 1.1;

let camTargetX = 0, camTargetY = 0;
let camX = 0, camY = 0;
let mode = 'face'; // 'face' | 'mouse'
let isTracking = false;

function lerp(a,b,t){ return a+(b-a)*t; }

// ── Mouse / Touch (fallback or manual) ──
function setPointer(px, py) {
  if (mode !== 'mouse') return;
  const nx = (px / window.innerWidth  - .5) * 2;
  const ny = (py / window.innerHeight - .5) * 2;
  camTargetX =  nx * CAM_RANGE_X;
  camTargetY = -ny * CAM_RANGE_Y;
}
window.addEventListener('mousemove', e => setPointer(e.clientX, e.clientY));
window.addEventListener('touchmove', e => {
  e.preventDefault();
  setPointer(e.touches[0].clientX, e.touches[0].clientY);
}, { passive:false });

function toggleMode() {
  if (!isTracking) return;
  mode = mode === 'face' ? 'mouse' : 'face';
  modeBtn.textContent = mode === 'face' ? '⇄ Souris' : '⇄ Face';
}

// ── MediaPipe Face Tracking ──
async function startTracking() {
  loading.style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const fm = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  fm.setOptions({
    maxNumFaces:1,
    refineLandmarks:false,
    minDetectionConfidence:.5,
    minTrackingConfidence:.5
  });
  fm.onResults(onFaceResults);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:320}, height:{ideal:240} }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      overlay.classList.add('hidden');
      hdot.className = 'on';
      stxt.innerHTML = 'Face <em>tracking actif</em>';
      isTracking = true;
      mode = 'face';
      modeBtn.textContent = '⇄ Souris';

      // fallback: if face not found after 3s, switch to mouse
      setTimeout(() => {
        if (!faceDetected && isTracking) {
          mode = 'mouse';
          modeBtn.textContent = '⇄ Face';
          hdot.className = 'on';
          stxt.innerHTML = '<em>Souris</em> mode (visage non détecté)';
        }
      }, 3000);

      (async function loop() {
        if (!isTracking) return;
        await fm.send({ image: video });
        requestAnimationFrame(loop);
      })();
    };
  } catch(e) {
    // Camera denied → switch to mouse mode automatically
    hdot.className = 'on';
    stxt.innerHTML = '<em>Souris</em> mode (caméra refusée)';
    overlay.classList.add('hidden');
    isTracking = true;
    mode = 'mouse';
    modeBtn.textContent = '⇄ Face';
    loading.style.display = 'none';
    // Bind full mouse/touch
    window.removeEventListener('mousemove', setPointer);
    window.addEventListener('mousemove', e => {
      const nx = (e.clientX/window.innerWidth-.5)*2;
      const ny = (e.clientY/window.innerHeight-.5)*2;
      camTargetX = nx*CAM_RANGE_X;
      camTargetY = -ny*CAM_RANGE_Y;
    });
    window.addEventListener('touchmove', e=>{
      e.preventDefault();
      const t=e.touches[0];
      const nx=(t.clientX/window.innerWidth-.5)*2;
      const ny=(t.clientY/window.innerHeight-.5)*2;
      camTargetX=nx*CAM_RANGE_X;
      camTargetY=-ny*CAM_RANGE_Y;
    },{ passive:false });
  }
}

let faceDetected = false;

function onFaceResults(r) {
  if (!r.multiFaceLandmarks?.length) {
    faceDetected = false;
    if (mode === 'face') {
      hdot.className = 'err';
      stxt.innerHTML = 'Visage <em style="color:#ff2d78">perdu</em>';
      camTargetX = lerp(camTargetX, 0, .05);
      camTargetY = lerp(camTargetY, 0, .05);
    }
    return;
  }

  faceDetected = true;
  if (mode !== 'face') return;

  hdot.className = 'on';
  stxt.innerHTML = 'Face <em>tracking actif</em>';

  const lm = r.multiFaceLandmarks[0];
  const nose=lm[1], forehead=lm[10], chin=lm[152], lc=lm[234], rc=lm[454];

  const fW   = Math.abs(rc.x - lc.x);
  const midX = (lc.x + rc.x) / 2;
  const normX = (nose.x - midX) / (fW / 2);  // -1..1

  const fH   = Math.abs(chin.y - forehead.y);
  const midY = (forehead.y + chin.y) / 2;
  const normY = (nose.y - midY) / (fH / 2);  // -1..1

  // ── THE HOLOGRAPHIC TRICK ──
  // Map head position → camera offset (not rotation!)
  camTargetX =  normX * CAM_RANGE_X;
  camTargetY = -normY * CAM_RANGE_Y;
}

// ═══════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════
const clock = new THREE.Clock();

(function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  // Smooth camera shift — HOLOGRAPHIC effect
  camX = lerp(camX, camTargetX, 0.08);
  camY = lerp(camY, camTargetY, 0.08);

  cam.position.x = camX;
  cam.position.y = camY;
  cam.position.z = 5;
  cam.lookAt(0, 0, 0);  // always looks at center — creates window illusion

  // Spin cubes
  meshes.forEach(({ group, d }, i) => {
    group.rotation.x += d.sx;
    group.rotation.y += d.sy;
    group.position.y = d.y + Math.sin(t * 0.35 + i * 1.1) * 0.07;
  });

  particles.rotation.y = t * 0.018;
  grid.position.x = camX * -.25;

  renderer.render(scene, cam);

  coordEl.textContent = `cam  x:${camX.toFixed(2)}  y:${camY.toFixed(2)}  z:5.00`;
})();

// Resize
window.addEventListener('resize', () => {
  cam.aspect = window.innerWidth / window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

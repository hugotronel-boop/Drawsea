<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3D Head Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #050508;
–accent: #00ffe0;
–accent2: #ff2d78;
–glass: rgba(255,255,255,0.04);
–border: rgba(0,255,224,0.15);
}

body {
background: var(–bg);
color: #e0e0e0;
font-family: ‘Space Mono’, monospace;
height: 100dvh;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
overflow: hidden;
user-select: none;
-webkit-user-select: none;
}

/* Animated grid background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
linear-gradient(rgba(0,255,224,0.04) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,224,0.04) 1px, transparent 1px);
background-size: 40px 40px;
z-index: 0;
pointer-events: none;
}

/* Glow blobs */
body::after {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse 60% 40% at 20% 80%, rgba(255,45,120,0.08) 0%, transparent 60%),
radial-gradient(ellipse 50% 50% at 80% 20%, rgba(0,255,224,0.06) 0%, transparent 60%);
z-index: 0;
pointer-events: none;
}

#status-bar {
position: fixed;
top: 0; left: 0; right: 0;
padding: 12px 20px;
display: flex;
align-items: center;
gap: 10px;
font-size: 11px;
letter-spacing: 0.1em;
text-transform: uppercase;
background: rgba(5,5,8,0.8);
border-bottom: 1px solid var(–border);
backdrop-filter: blur(10px);
z-index: 100;
}

#status-dot {
width: 8px; height: 8px;
border-radius: 50%;
background: #555;
transition: background 0.3s;
flex-shrink: 0;
}
#status-dot.active { background: var(–accent); box-shadow: 0 0 8px var(–accent); animation: pulse 1.5s infinite; }
#status-dot.error { background: var(–accent2); box-shadow: 0 0 8px var(–accent2); }

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.4; }
}

#status-text { color: rgba(255,255,255,0.5); }
#status-text span { color: var(–accent); }

/* Debug coords */
#coords {
position: fixed;
bottom: 16px; left: 50%;
transform: translateX(-50%);
font-size: 10px;
letter-spacing: 0.08em;
color: rgba(255,255,255,0.2);
z-index: 100;
font-family: ‘Space Mono’, monospace;
pointer-events: none;
}

/* Hidden video */
#video {
position: fixed;
top: -9999px; left: -9999px;
width: 1px; height: 1px;
}

/* Scene container */
#scene-wrap {
position: relative;
z-index: 10;
perspective: 800px;
width: min(380px, 90vw);
height: min(380px, 90vw);
}

#scene {
width: 100%; height: 100%;
transform-style: preserve-3d;
transform: rotateX(0deg) rotateY(0deg);
transition: transform 0.08s cubic-bezier(0.25, 0.46, 0.45, 0.94);
will-change: transform;
}

/* The 3D card */
.card {
position: absolute;
inset: 0;
background: var(–glass);
border: 1px solid var(–border);
border-radius: 24px;
backdrop-filter: blur(20px);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 20px;
transform-style: preserve-3d;
overflow: hidden;
}

/* Shimmer layer that follows head */
.card::before {
content: ‘’;
position: absolute;
inset: 0;
border-radius: 24px;
background: radial-gradient(circle at var(–mx, 50%) var(–my, 50%), rgba(0,255,224,0.12) 0%, transparent 60%);
pointer-events: none;
transition: background 0.1s;
}

.card-title {
font-family: ‘Syne’, sans-serif;
font-size: clamp(28px, 7vw, 42px);
font-weight: 800;
letter-spacing: -0.02em;
background: linear-gradient(135deg, #fff 30%, var(–accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
transform: translateZ(40px);
text-align: center;
}

/* Floating layers for parallax depth */
.layer {
position: absolute;
border-radius: 12px;
}

.layer-1 {
width: 60px; height: 60px;
border: 1px solid var(–border);
top: 20px; left: 20px;
transform: translateZ(20px);
background: linear-gradient(135deg, rgba(0,255,224,0.08), transparent);
animation: float1 4s ease-in-out infinite;
}
.layer-2 {
width: 40px; height: 40px;
border: 1px solid rgba(255,45,120,0.2);
bottom: 30px; right: 25px;
transform: translateZ(60px);
background: linear-gradient(135deg, rgba(255,45,120,0.08), transparent);
animation: float2 5s ease-in-out infinite;
}
.layer-3 {
width: 20px; height: 20px;
border-radius: 50%;
border: 1px solid var(–border);
top: 40px; right: 40px;
transform: translateZ(80px);
background: rgba(0,255,224,0.1);
animation: float3 3.5s ease-in-out infinite;
}
.layer-4 {
width: 50px; height: 2px;
background: linear-gradient(90deg, transparent, var(–accent), transparent);
bottom: 60px; left: 30px;
transform: translateZ(30px);
animation: float1 6s ease-in-out infinite reverse;
}

@keyframes float1 { 0%,100%{transform:translateZ(20px) translateY(0)} 50%{transform:translateZ(20px) translateY(-8px)} }
@keyframes float2 { 0%,100%{transform:translateZ(60px) translateY(0)} 50%{transform:translateZ(60px) translateY(6px)} }
@keyframes float3 { 0%,100%{transform:translateZ(80px) translateY(0) scale(1)} 50%{transform:translateZ(80px) translateY(-5px) scale(1.1)} }

.badge {
display: flex;
align-items: center;
gap: 8px;
padding: 8px 16px;
border: 1px solid var(–border);
border-radius: 100px;
font-size: 11px;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(–accent);
transform: translateZ(50px);
background: rgba(0,255,224,0.04);
}

.badge-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–accent);
box-shadow: 0 0 6px var(–accent);
animation: pulse 1.5s infinite;
}

/* Corner decorations */
.corner {
position: absolute;
width: 16px; height: 16px;
border-color: rgba(0,255,224,0.3);
border-style: solid;
}
.corner-tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; border-radius: 3px 0 0 0; }
.corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; border-radius: 0 3px 0 0; }
.corner-bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; border-radius: 0 0 0 3px; }
.corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; border-radius: 0 0 3px 0; }

/* Start overlay */
#overlay {
position: fixed;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 24px;
z-index: 200;
transition: opacity 0.5s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

#overlay h1 {
font-family: ‘Syne’, sans-serif;
font-size: clamp(32px, 8vw, 52px);
font-weight: 800;
letter-spacing: -0.03em;
text-align: center;
background: linear-gradient(135deg, #fff, var(–accent));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
padding: 0 20px;
}

#overlay p {
font-size: 12px;
color: rgba(255,255,255,0.35);
letter-spacing: 0.06em;
text-align: center;
max-width: 260px;
line-height: 1.8;
}

#start-btn {
margin-top: 8px;
padding: 14px 36px;
background: transparent;
border: 1px solid var(–accent);
border-radius: 100px;
color: var(–accent);
font-family: ‘Space Mono’, monospace;
font-size: 12px;
letter-spacing: 0.15em;
text-transform: uppercase;
cursor: pointer;
position: relative;
overflow: hidden;
transition: color 0.3s, box-shadow 0.3s;
}
#start-btn::before {
content: ‘’;
position: absolute;
inset: 0;
background: var(–accent);
transform: scaleX(0);
transform-origin: left;
transition: transform 0.3s;
}
#start-btn:hover::before, #start-btn:active::before { transform: scaleX(1); }
#start-btn:hover, #start-btn:active { color: var(–bg); box-shadow: 0 0 20px rgba(0,255,224,0.3); }
#start-btn span { position: relative; z-index: 1; }

#loading {
display: none;
font-size: 11px;
color: rgba(255,255,255,0.3);
letter-spacing: 0.1em;
animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>

</head>
<body>

<!-- Start overlay -->

<div id="overlay">
  <h1>3D Head<br>Tracker</h1>
  <p>Bouge ta tête — la carte suit ta perspective en temps réel.</p>
  <button id="start-btn" onclick="startTracking()"><span>Activer la caméra</span></button>
  <div id="loading">Chargement du modèle IA...</div>
</div>

<!-- Status bar -->

<div id="status-bar">
  <div id="status-dot"></div>
  <div id="status-text">En attente de la caméra</div>
</div>

<!-- Hidden video feed -->

<video id="video" playsinline autoplay muted></video>

<!-- 3D Scene -->

<div id="scene-wrap">
  <div id="scene">
    <div class="card" id="card">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

```
  <div class="layer layer-1"></div>
  <div class="layer layer-2"></div>
  <div class="layer layer-3"></div>
  <div class="layer layer-4"></div>

  <div class="badge"><div class="badge-dot"></div>Live 3D</div>
  <div class="card-title">Head<br>Tracking</div>
  <div class="badge" style="color:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.08);font-size:10px">Move your head →</div>
</div>
```

  </div>
</div>

<div id="coords">X: 0.0° &nbsp; Y: 0.0°</div>

<!-- MediaPipe FaceMesh via CDN -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
const video   = document.getElementById('video');
const scene   = document.getElementById('scene');
const card    = document.getElementById('card');
const dot     = document.getElementById('status-dot');
const txt     = document.getElementById('status-text');
const coords  = document.getElementById('coords');
const overlay = document.getElementById('overlay');
const loading = document.getElementById('loading');

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;
let isTracking = false;

// Smooth lerp loop
function lerp(a, b, t) { return a + (b - a) * t; }

function animate() {
  requestAnimationFrame(animate);
  currentX = lerp(currentX, targetX, 0.12);
  currentY = lerp(currentY, targetY, 0.12);
  scene.style.transform = `rotateX(${currentX}deg) rotateY(${currentY}deg)`;
  
  // Shimmer follows head position (map -30..30 to 0..100%)
  const mx = ((currentY + 30) / 60) * 100;
  const my = ((-currentX + 30) / 60) * 100;
  card.style.setProperty('--mx', mx + '%');
  card.style.setProperty('--my', my + '%');

  coords.textContent = `X: ${currentY.toFixed(1)}°   Y: ${currentX.toFixed(1)}°`;
}
animate();

// Nose tip landmark index in FaceMesh: 1
// We track nose (1) vs forehead (10) to get vertical, and nose vs ear distance for horizontal
async function startTracking() {
  loading.style.display = 'block';
  document.getElementById('start-btn').style.display = 'none';

  const faceMesh = new FaceMesh({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
  });

  faceMesh.setOptions({
    maxNumFaces: 1,
    refineLandmarks: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });

  faceMesh.onResults(onResults);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      overlay.classList.add('hidden');
      dot.classList.add('active');
      txt.innerHTML = 'Tracking <span>en cours</span>';
      isTracking = true;
      processFrame(faceMesh);
    };
  } catch(e) {
    dot.classList.add('error');
    txt.textContent = 'Caméra refusée — vérifie les permissions';
    loading.style.display = 'none';
    document.getElementById('start-btn').style.display = '';
    overlay.classList.remove('hidden');
  }
}

async function processFrame(faceMesh) {
  if (!isTracking) return;
  await faceMesh.send({ image: video });
  requestAnimationFrame(() => processFrame(faceMesh));
}

let frameCount = 0;
function onResults(results) {
  if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
    dot.classList.remove('active');
    dot.classList.add('error');
    txt.innerHTML = 'Visage <span style="color:var(--accent2)">perdu</span> — repositionne-toi';

    // Gradually return to center
    targetX = 0; targetY = 0;
    return;
  }

  dot.classList.remove('error');
  dot.classList.add('active');
  txt.innerHTML = 'Tracking <span>actif</span>';

  const lm = results.multiFaceLandmarks[0];

  // Key landmarks:
  // 1  = nose tip
  // 10 = forehead center
  // 152= chin
  // 234= left cheek (from user's perspective)
  // 454= right cheek
  const nose      = lm[1];
  const forehead  = lm[10];
  const chin      = lm[152];
  const leftCheek = lm[234];
  const rightCheek= lm[454];

  // Horizontal: nose X relative to midpoint of cheeks
  const faceWidth = Math.abs(rightCheek.x - leftCheek.x);
  const faceMidX  = (leftCheek.x + rightCheek.x) / 2;
  const normX     = (nose.x - faceMidX) / (faceWidth / 2); // -1..1

  // Vertical: nose Y relative to midpoint of forehead+chin
  const faceHeight = Math.abs(chin.y - forehead.y);
  const faceMidY   = (forehead.y + chin.y) / 2;
  const normY      = (nose.y - faceMidY) / (faceHeight / 2); // -1..1

  const MAX_ROT = 28;
  // rotateY = horizontal pan, rotateX = vertical tilt (inverted)
  targetY =  normX * MAX_ROT;
  targetX = -normY * MAX_ROT;
}
</script>

</body>
</html>

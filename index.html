<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sunset Mic Reactive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gradient"></div>

<div class="start">
  <button id="startBtn">Activer le micro</button>
</div>

<script src="script.js"></script>
</body>
</html><style>html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: sans-serif;
}

.gradient {
  position: fixed;
  width: 100%;
  height: 100%;
  filter: blur(90px);
  transition: background 0.1s linear;
}

.start {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 10;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  background: #ff5e62;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}</style><script>const gradient = document.querySelector(".gradient");
const startBtn = document.getElementById("startBtn");

let audioContext;
let analyser;
let dataArray;

let angle = 0;

startBtn.addEventListener("click", async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioContext.createMediaStreamSource(stream);

  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  source.connect(analyser);

  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  startBtn.style.display = "none";

  animate();
});

function animate() {
  requestAnimationFrame(animate);

  analyser.getByteFrequencyData(dataArray);

  // Moyenne générale du volume
  let volume = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
  let intensity = volume / 255;

  angle += 0.01;

  const x = 50 + Math.sin(angle) * 15;
  const y = 50 + Math.cos(angle) * 15;

  const glow = 1 + intensity * 1.5;

  gradient.style.background = `
    radial-gradient(circle at ${x}% ${y}%,
      rgba(255,153,102,${glow}),
      rgba(255,94,98,${glow}),
      rgba(201,75,75,${glow}),
      rgba(75,19,79,1),
      rgba(0,0,0,1)
    )
  `;
}</script>
